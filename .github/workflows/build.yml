name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build macOS app
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_26.5.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.0.app
          elif [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app
          fi
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild \
            -project AudioInputLocker.xcodeproj \
            -scheme AudioInputLocker \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/DerivedData \
            build
